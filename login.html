<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Acesso administrativo - Bodega do Galego">
    <title>Login - Bodega do Galego</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <script>
        (function(){var t=localStorage.getItem('bodega_tema');if(t){document.documentElement.setAttribute('data-theme',t)}else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches){document.documentElement.setAttribute('data-theme','dark')}})();
    </script> 
    
     <link rel="icon" type="imagecon" href="img/logo.jpeg">        
</head>
<body class="login-page">

    <div class="login-tema-wrapper">
        <button class="btn-tema" title="Alternar modo escuro" aria-label="Alternar modo escuro">
            <span class="tema-icon"></span>
        </button>
    </div>

    <div class="login-bg">
        <div class="orb orb-1"></div>
    </div>

    <div class="login-card">
        <div class="login-header">
            <img src="img/logo.jpeg" alt="Logo Bodega do Galego" class="login-logo-img">
            <h1>Bodega do Galego</h1>
            <p>Painel Administrativo</p>
        </div>

        <form id="login-form" class="login-form">
            <div id="login-erro" class="login-erro"></div>

            <div class="input-group">
                <label for="username">Usuário</label>
                <span class="input-icon"><i class="fa-solid fa-user-tie" style="color: rgb(255, 212, 59);"></i></span>
                <input
                    type="text"
                    id="username"
                    class="login-input"
                    placeholder="Digite seu usuário"
                    autocomplete="username"
                    required
                >
            </div>

            <div class="input-group">
                <label for="password">Senha</label>
                <span class="input-icon"><i class="fa-solid fa-lock" style="color: rgb(255, 212, 59);"></i></span>
                <div class="password-wrapper">
                    <input
                        type="password"
                        id="password"
                        class="login-input"
                        placeholder="Digite sua senha"
                        autocomplete="current-password"
                        required
                    >
                    <button type="button" id="btn-toggle-password" class="btn-toggle-password" aria-label="Mostrar senha">
                        <i class="fa-solid fa-eye" id="eye-icon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-login">
                Entrar no Painel
            </button>
        </form>

        <div class="login-footer">
            <a href="index.html">← Voltar para a vitrine</a>
        </div>
    </div>

    <script src="js/tema.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
