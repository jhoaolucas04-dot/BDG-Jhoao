<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Painel administrativo - Gerencie os produtos da Bodega do Galego">
    <title>Dashboard Admin - Bodega do Galego</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-page">

    <!-- Header -->
    <header class="admin-header">
        <h2><span class="header-dot"></span> Dashboard Admin</h2>
        <nav class="admin-nav">
            <a href="index.html">🏪 Ver Vitrine</a>
            <a href="#" id="btn-logout" class="btn-logout">🚪 Sair</a>
        </nav>
    </header>

    <!-- Stat Cards -->
    <section class="cards-resumo">
        <div class="stat-card">
            <h3>Total de Produtos</h3>
            <div class="stat-value" id="total-produtos">0</div>
        </div>
        <div class="stat-card">
            <h3>Valor Total em Estoque</h3>
            <div class="stat-value" id="valor-estoque">R$ 0,00</div>
        </div>
        <div class="stat-card">
            <h3>Itens Esgotados</h3>
            <div class="stat-value" id="itens-esgotados">0</div>
        </div>
    </section>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Product Form -->
        <div class="box">
            <h2 class="box-title box-title-form">➕ Novo Produto</h2>
            <form id="product-form" class="product-form">
                <input type="hidden" id="prod-id">

                <input
                    type="text"
                    id="prod-nome"
                    class="form-input"
                    placeholder="Nome do Produto"
                    required
                >

                <input
                    type="number"
                    id="prod-preco"
                    class="form-input"
                    step="0.01"
                    min="0"
                    placeholder="Preço (R$)"
                    required
                >

                <input
                    type="number"
                    id="prod-estoque"
                    class="form-input"
                    min="0"
                    placeholder="Quantidade em Estoque"
                    required
                >

                <select id="prod-categoria" class="form-input">
                    <option value="Acessórios">Acessórios</option>
                    <option value="Cabos">Cabos</option>
                    <option value="Fones">Fones</option>
                    <option value="TV e Áudio">TV e Áudio</option>
                </select>

                <input
                    type="url"
                    id="prod-imagem"
                    class="form-input"
                    placeholder="URL da imagem (cole o link aqui)"
                >

                <div id="image-preview-wrapper" class="image-preview-wrapper">
                    <img id="img-preview" src="" alt="Preview" style="display: none;">
                    <span class="placeholder-text">📷 Preview da imagem aparecerá aqui</span>
                </div>

                <button type="submit" class="btn-salvar">💾 Salvar Produto</button>
                <button type="button" id="btn-cancelar" class="btn-cancelar">✖ Cancelar Edição</button>
            </form>
        </div>

        <!-- Products Table -->
        <div class="box">
            <h2 class="box-title">📦 Produtos Cadastrados</h2>
            <div class="table-wrapper">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Img</th>
                            <th>Produto</th>
                            <th>Preço</th>
                            <th>Estoque</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Scripts: dados.js MUST load before admin.js -->
    <script src="js/dados.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
