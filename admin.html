<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Painel administrativo - Gerencie os produtos da Bodega do Galego">
    <title>Dashboard Admin - Bodega do Galego</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
    <!-- Prevenir flash de tema errado -->
    <script>
        (function () { var t = localStorage.getItem('bodega_tema'); if (t) { document.documentElement.setAttribute('data-theme', t) } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme:dark)').matches) { document.documentElement.setAttribute('data-theme', 'dark') } })();
    </script>
    <link rel="icon" type="image/jpeg" href="img/logo.jpeg">
</head>

<body class="admin-page">

    <!-- Header -->
    <header class="admin-header">
        <h2>
            <img src="img/logo.jpeg" alt="Logo" class="admin-logo-img">
            Dashboard Admin
        </h2>
        <nav class="admin-nav">
            <button class="btn-tema" title="Alternar modo escuro" aria-label="Alternar modo escuro">
                <span class="tema-icon"></span>
            </button>
            <a href="index.html"><i class="fa-solid fa-store" style="color: rgb(255, 212, 59);"></i> Ver Vitrine</a>
            <a href="#" id="btn-logout" class="btn-logout"><i class="fa-solid fa-arrow-right-from-bracket"
                    style="color: rgb(255, 45, 45);"></i> Sair</a>
        </nav>
    </header>

    <!-- Stat Cards -->
    <section class="cards-resumo">
        <div class="stat-card">
            <h3>Total de Produtos</h3>
            <div class="stat-value" id="total-produtos">0</div>
        </div>
        <div class="stat-card">
            <h3>Valor Total em Estoque</h3>
            <div class="stat-value" id="valor-estoque">R$ 0,00</div>
        </div>
        <div class="stat-card">
            <h3>Itens Esgotados</h3>
            <div class="stat-value" id="itens-esgotados">0</div>
        </div>
    </section>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Product Form -->
        <div class="box">
            <h2 class="box-title box-title-form"><i class="fa-solid fa-plus"></i> Novo Produto</h2>
            <form id="product-form" class="product-form">
                <input type="hidden" id="prod-id">

                <input type="text" id="prod-nome" class="form-input" placeholder="Nome do Produto" required>

                <input type="number" id="prod-preco" class="form-input" step="0.01" min="0" placeholder="Preço (R$)"
                    required>

                <input type="number" id="prod-estoque" class="form-input" min="0" placeholder="Quantidade em Estoque"
                    required>

                <select id="prod-categoria" class="form-input">
                    <option value="Acessórios">Acessórios</option>
                    <option value="Cabos">Cabos</option>
                    <option value="Fones">Fones</option>
                    <option value="Áudio">Áudio</option>
                    <option value="Reparos">Reparos e serviços</option>
                </select>

                <div class="image-method-selector">
                    <button type="button" id="method-url" class="method-btn active"><i class="fa-solid fa-link"></i> Link da Internet</button>
                    <button type="button" id="method-file" class="method-btn"><i class="fa-solid fa-file-arrow-up"></i> Upload de Arquivo</button>
                </div>

                <div id="group-image-url" class="image-group">
                    <input type="url" id="prod-imagem" class="form-input" placeholder="URL da imagem (cole o link aqui)">
                </div>

                <div id="group-image-file" class="image-group" style="display: none;">
                    <label for="prod-imagem-file" class="file-upload-label">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <span>Escolher arquivo de imagem</span>
                        <input type="file" id="prod-imagem-file" accept="image/*">
                    </label>
                    <div id="file-name-display" class="file-name-display">Nenhum arquivo selecionado</div>
                </div>

                <div id="image-preview-wrapper" class="image-preview-wrapper">
                    <img id="img-preview" src="" alt="Preview" style="display: none;">
                    <span class="placeholder-text"><i class="fa-solid fa-camera"></i> Preview da imagem aparecerá aqui</span>
                </div>

                <button type="submit" class="btn-salvar" id="btn-submit"> <i class="fa-solid fa-plus"></i> Adicionar
                    Produto</button>
                <button type="button" id="btn-cancelar" class="btn-cancelar">✖ Cancelar Edição</button>
            </form>
        </div>

        <!-- Products Table -->
        <div class="box">
            <h2 class="box-title"><i class="fa-solid fa-box-open" style="color: rgb(82, 69, 57);"></i> Produtos
                Cadastrados</h2>
            <div class="table-wrapper">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Img</th>
                            <th>Produto</th>
                            <th>Preço</th>
                            <th>Estoque</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/dados.js"></script>
    <script src="js/tema.js"></script>
    <script src="js/admin.js"></script>
</body>

</html>
