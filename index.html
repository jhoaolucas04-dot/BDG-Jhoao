<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Bodega do Galego - Os melhores acessórios de tecnologia com preço justo. Compre pelo WhatsApp!">
    <title>Bodega do Galego - Vitrine Virtual</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/vitrine.css">
    <!-- Prevenir flash de tema errado -->
    <script>
        (function(){var t=localStorage.getItem('bodega_tema');if(t){document.documentElement.setAttribute('data-theme',t)}else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches){document.documentElement.setAttribute('data-theme','dark')}})();
    </script>
     <link rel="icon" type="imagecon" href="img/logo.jpeg">      
</head>
<body>

    <!-- Header -->
    <header class="vitrine-header">
        <div class="logo">
            <img src="img/logo.jpeg" alt="Bodega do Galego" class="logo-img">
            Bodega do <span>Galego</span>
        </div>
        <input
            type="text"
            id="search"
            class="search-bar"
            placeholder="Buscar produtos..."
        >
        <div class="header-actions">
            <button class="btn-tema" title="Alternar modo escuro" aria-label="Alternar modo escuro">
                <span class="tema-icon">🌙</span>
            </button>
            <a href="login.html" class="admin-btn">🔐 Cadastre-se</a>
        </div>
    </header>

    <!-- Carrossel de Produtos (substituiu o banner) -->
    <section class="carousel" id="carousel">
        <div class="carousel-track" id="carousel-track">
            <!-- Populado pelo JS -->
        </div>
        <button class="carousel-btn carousel-prev" id="carousel-prev" aria-label="Slide anterior">❮</button>
        <button class="carousel-btn carousel-next" id="carousel-next" aria-label="Próximo slide">❯</button>
        <div class="carousel-dots" id="carousel-dots"></div>
    </section>

    <!-- Categories -->
    <section class="categories">
        <h2>Categorias</h2>
        <div class="category-list" id="category-container">
            <div class="category-item active" data-categoria="Todos">Todos</div>
            <div class="category-item" data-categoria="Acessórios">Acessórios</div>
            <div class="category-item" data-categoria="Cabos">Cabos</div>
            <div class="category-item" data-categoria="Fones">Fones</div>
            <div class="category-item" data-categoria="TV e Áudio">TV e Áudio</div>
        </div>
    </section>

    <!-- Product Grid -->
    <main class="vitrine" id="vitrine-container">
    </main>

    <!-- Footer -->
    <footer class="vitrine-footer">
        <p>© 2025 Bodega do Galego — Todos os direitos reservados</p>
    </footer>

    <!-- Scripts -->
    <script src="js/dados.js"></script>
    <script src="js/tema.js"></script>
    <script src="js/vitrine.js"></script>
</body>
</html>
